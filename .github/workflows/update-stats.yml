name: Update Organization Stats

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write   # needed only to push svg

concurrency:
  group: metrics-stats
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: BurkimbIA
          template: classic
          base: header, activity, community, repositories
          config_timezone: Africa/Ouagadougou
          plugin_repositories: yes
          plugin_repositories_featured: BurkimbIA/burkimbia
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          output_action: none
          filename: github-metrics.svg
          committer_branch: ""

      - name: Compute comprehensive organization stats
        if: always()  # do not skip stats just because the SVG step failed
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          set -uo pipefail
          ORG=BurkimbIA
          META=.github/workflows/metadata.json

          public_repos=0
          private_repos=0
          total_commits=0
          total_prs=0

          # Load contributors list from metadata.json
          mapfile -t contributors_list < <(jq -r '.contributors[]' "$META")
          for c in "${contributors_list[@]}"; do echo 0 > "/tmp/contrib_${c}.txt"; done

          # List all repos in the org (paginated automatically by gh)
          gh api --paginate "/orgs/$ORG/repos?per_page=100" \
            --jq '.[] | {name: .name, private: .private}' > /tmp/repos.jsonl

          # IMPORTANT: read from a file (not a pipe) so counter increments survive the loop
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            repo=$(echo "$line" | jq -r '.name')
            is_private=$(echo "$line" | jq -r '.private')

            if [ "$is_private" = "true" ]; then
              private_repos=$((private_repos + 1))
            else
              public_repos=$((public_repos + 1))
            fi

            echo "::group::Processing $repo (private=$is_private)"

            # Collect commits across ALL branches, then dedupe by SHA so a commit
            # appearing on multiple branches is counted once. Captures every
            # commit type (regular, merge, squash, force-pushed history, etc.).
            : > /tmp/repo_commits.tsv
            mapfile -t branches < <(gh api --paginate "/repos/$ORG/$repo/branches?per_page=100" --jq '.[].name' 2>/dev/null || true)
            for br in "${branches[@]}"; do
              [ -z "$br" ] && continue
              gh api --paginate "/repos/$ORG/$repo/commits?sha=$br&per_page=100" \
                --jq '.[] | [.sha, (.author.login // "")] | @tsv' 2>/dev/null \
                >> /tmp/repo_commits.tsv || true
            done

            # Dedupe by SHA (column 1), keep first author seen
            awk -F'\t' '!seen[$1]++' /tmp/repo_commits.tsv > /tmp/repo_unique.tsv
            repo_commit_count=$(wc -l < /tmp/repo_unique.tsv)
            total_commits=$((total_commits + repo_commit_count))
            echo "  unique commits across all branches: $repo_commit_count"

            # Per-contributor with alias expansion (main login + aliases → one counter)
            for contributor in "${contributors_list[@]}"; do
              logins_json=$(jq -c --arg c "$contributor" '[$c] + (.aliases[$c] // [])' "$META")
              n=$(awk -F'\t' -v logins="$logins_json" '
                BEGIN {
                  gsub(/[\[\]"]/, "", logins);
                  split(logins, a, ",");
                  for (i in a) m[a[i]] = 1;
                  c = 0;
                }
                ($2 in m) { c++ }
                END { print c+0 }
              ' /tmp/repo_unique.tsv)
              current=$(cat "/tmp/contrib_${contributor}.txt")
              echo $((current + n)) > "/tmp/contrib_${contributor}.txt"
            done

            # All PRs (open + closed + merged), paginated
            pr_count=$(gh api --paginate "/repos/$ORG/$repo/pulls?state=all&per_page=100" --jq '.[].number' 2>/dev/null | wc -l)
            total_prs=$((total_prs + pr_count))
            echo "  pull requests (all states): $pr_count"
            echo "::endgroup::"
          done < /tmp/repos.jsonl

          total_contributors=${#contributors_list[@]}
          commits_per_contributor=0
          if [ "$total_contributors" -gt 0 ]; then
            commits_per_contributor=$((total_commits / total_contributors))
          fi

          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p metrics_renders

          # Build contributors JSON object
          contributors_json="{"
          first=true
          for contributor in "${contributors_list[@]}"; do
            contrib_count=$(cat "/tmp/contrib_${contributor}.txt")
            if [ "$first" = true ]; then first=false; else contributors_json+=","; fi
            contributors_json+="\"$contributor\": $contrib_count"
          done
          contributors_json+="}"

          cat > metrics_renders/org-stats.json <<EOF
          {
            "organization": "$ORG",
            "public_repositories": $public_repos,
            "private_repositories": $private_repos,
            "total_repositories": $((public_repos + private_repos)),
            "total_commits": $total_commits,
            "total_pull_requests": $total_prs,
            "total_contributors": $total_contributors,
            "commits_per_contributor": $commits_per_contributor,
            "contributor_commits": $contributors_json,
            "updated_at": "$timestamp"
          }
          EOF

          echo "Organization stats computed:"
          cat metrics_renders/org-stats.json

      - name: Commit metrics (always)
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Debug: List all generated files
          echo "Files in current directory:"
          ls -la
          echo "Files in metrics_renders (if exists):"
          ls -la metrics_renders/ || echo "metrics_renders directory not found"
          
          # Move SVG to correct location if needed
          if [ -f "github-metrics.svg" ]; then
            echo "Found github-metrics.svg at root, moving to metrics_renders/"
            mkdir -p metrics_renders
            mv github-metrics.svg metrics_renders/
          elif [ -f "metrics_renders/github-metrics.svg" ]; then
            echo "SVG already in metrics_renders/"
          else
            echo "ERROR: github-metrics.svg not found anywhere!"
            echo "Checking for any SVG files:"
            find . -name "*.svg" -type f
          fi
          
          # Always add and commit (even if no changes)
          git add metrics_renders/ || echo "No metrics_renders to add"
          git commit -m "chore(metrics): refresh metrics svg + org stats" || echo "No changes to commit"
          git push || echo "Nothing pushed"
